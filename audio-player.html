<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Player | EduWave</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container nav-row">
      <a href="index.html" class="brand">EduWave</a>
      <div class="auth-links"></div>
    </div>
  </header>

  <main class="section-pad audio-page">
    <div class="container audio-card">
      <p class="eyebrow">Audio Lesson</p>
      <h1>Language Listening Lab</h1>
      <p class="instructor">By Kwame Boateng</p>
      <div class="audio-player">
        <button class="audio-action btn btn-primary">Play</button>
        <div class="progress-line"><span style="width: 35%;"></span></div>
        <div class="audio-meta">
          <span>00:08</span>
          <span>24:00</span>
        </div>
      </div>
      <div class="playlist-card">
        <h2>Playlist queue</h2>
        <ul class="playlist-list">
          <li>Listening Practice 1</li>
          <li class="active">Listening Practice 2</li>
          <li>Vocabulary Booster</li>
        </ul>
      </div>
      <a href="#" class="btn btn-outline full">Download for offline</a>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html">Home</a>
    <a href="courses.html">Courses</a>
    <a href="radio.html">Radio</a>
    <a href="dashboard.html">Library</a>
    <a href="profile.html">Profile</a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
